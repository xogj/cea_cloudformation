# created by jeison guerrero 
AWSTemplateFormatVersion: "2010-09-09"
Description: 'Cloudformation for VPC'
Parameters: {}
Resources:
  MyVPC: 
    Type: 'AWS::EC2::VPC'
    Properties:
      CidrBlock: '172.16.0.0/16'
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: MyVPC 
# Public Subnet AZ 1
  PublicSubnet1A:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: '172.16.1.0/24'
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags: 
        - Key: Name 
          Value: PublicSubnet1A
# Public App Private  AZ 1
  AppPrivateSubnet1A: 
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: '172.16.2.0/24'
      AvailabilityZone: !Select [0, !GetAZs '']
# Public Data Privarcy Subnet AZ 1
  DataPrivateSubnet1A: 
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: '172.16.3.0/24'
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags: 
        - Key: Name 
          Value: DataPrivateSubnet1A
# Public Subnet AZ 2
  PublicSubnet2B:
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: '172.16.4.0/24'
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags: 
        - Key: Name 
          Value: PublicSubnet2B
# Public App Private  AZ 1
  AppPrivateSubnet2B: 
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: '172.16.5.0/24'
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags: 
        - Key: Name 
          Value: AppPrivateSubnet2B 
# Public Data Privarcy Subnet AZ 1
  DataPrivateSubnet2B: 
    Type: 'AWS::EC2::Subnet'
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: '172.16.6.0/24'
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags: 
        - Key: Name 
          Value: DataPrivateSubnet2B

# Internet Gateway 
  InterentGateway: 
   Type: 'AWS::EC2::InternetGateway'
   Properties:
     Tags: 
        - Key: Name
          Value:  MyVPC-IGW 

# Attach IGW  to the VPC 
  AttachGateway: 
    Type: 'AWS::EC2::VPCGatewayAttachment'
    Properties:
      VpcId: !Ref MyVPC 
      InternetGatewayId: !Ref InterentGateway
      
# Route Tables 
  PublicRouteTable: 
    Type: 'AWS::EC2::RouteTable'
    Properties: 
      VpcId: !Ref MyVPC
      Tags: 
        - Key: Name 
          Value: PublicRouteTable 

#Routes 
  PublicRoutes: 
    Type: 'AWS::EC2::Route'
    DependsOn: AttachGateway
    Properties: 
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InterentGateway
      
# Subnet Assocations 
  PublicSubnet1ARouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1A
      RouteTableId: !Ref PublicRouteTable
# Public Subnet 
  PublicSubnet2BRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2B
      RouteTableId: !Ref PublicRouteTable
#Bastion Host EC2
  BastionHost:
    Type: 'AWS::EC2::Instance'
    Properties: 
      InstanceType: t2.micro
      KeyName: bastion
      ImageId: ami-0ea87431b78a82070
      SubnetId: !Ref PublicSubnet2B
      SecurityGroupIds:
        - !Ref BastionSG
      Tags:
        - Key: Name
          Value: BastionHost 

# Bastion Security Groups 
  BastionSG: 
    Type: 'AWS::EC2::SecurityGroup'
    Properties: 
      GroupDescription: 'Enable SSH Access'
      VpcId: !Ref MyVPC 
      SecurityGroupIngress: 
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22 
          CidrIp: 94.202.247.128/32
  #App Instance1A 
  Appinstance1A:
    Type: 'AWS::EC2::Instance'
    Properties:
      InstanceType: t2.micro
      KeyName: bastion 
      ImageId: ami-0ea87431b78a82070
      SubnetId: !Ref AppPrivateSubnet1A
      SecurityGroupIds:
       - !Ref AppInstance1ASG
      Tags: 
        - Key: Name 
          Value: App1
 #App Instance 2B 
  AppInstacnce2B: 
    Type: 'AWS::EC2::Instance'
    Properties:
      InstanceType: t2.micro
      ImageId:  ami-0ea87431b78a82070
      SubnetId: !Ref AppPrivateSubnet2B
      SecurityGroupIds:
        - !Ref AppInstance2BSG 
      Tags: 
       - Key: Name 
         Value: App2 
  # Security Groups App Instance 1A
  AppInstance1ASG: 
    Type: 'AWS::EC2::SecurityGroup'
    Properties: 
      GroupDescription: 'Allow SSH from Bastion'
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          SourceSecurityGroupId: !Ref BastionSG
# Security Group App Instance 
  AppInstance2BSG:
    Type: 'AWS::EC2::SecurityGroup'
    Properties: 
      GroupDescription: 'Allow ICMP Ping from App1'
      VpcId: !Ref MyVPC 
      SecurityGroupIngress: 
        - IpProtocol: icmp
          FromPort: -1 
          ToPort: -1 
          SourceSecurityGroupId: !Ref AppInstance1ASG 