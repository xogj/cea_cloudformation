AWSTemplateFormatVersion: "2010-09-09"
Description: "CloudFormation template to create an S3 Bucket for static website hosting"

Resources:
  MyyS3Bucket:
    Type: "AWS::S3::Bucket"
    Properties:
      BucketName: "my-static-website-bucket"
      WebsiteConfiguration:
        IndexDocument: "index.html"
  